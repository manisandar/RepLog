<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4" />
      <stop offset="100%" stop-color="#7B2CBF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#0D0F12" />
  <rect width="500" height="500" x="6" y="6" rx="114" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.4" />
  <!-- Dumbbell / Weight Icon -->
  <g filter="url(#glow)">
    <!-- Left Weight Plates -->
    <rect x="76" y="176" width="36" height="160" rx="12" fill="url(#grad)" />
    <rect x="122" y="146" width="38" height="220" rx="14" fill="#00F5D4" />
    <!-- Barbell Shaft -->
    <rect x="160" y="236" width="192" height="40" rx="10" fill="#E2E8F0" />
    <line x1="190" y1="236" x2="190" y2="276" stroke="#0D0F12" stroke-width="6" stroke-linecap="round" />
    <line x1="322" y1="236" x2="322" y2="276" stroke="#0D0F12" stroke-width="6" stroke-linecap="round" />
    <!-- Right Weight Plates -->
    <rect x="352" y="146" width="38" height="220" rx="14" fill="#00F5D4" />
    <rect x="400" y="176" width="36" height="160" rx="12" fill="url(#grad)" />
  </g>
  <!-- Lightning / Energy Bolt inside Barbell -->
  <path d="M266 220 L242 258 L262 258 L248 296 L276 254 L254 254 Z" fill="#FF3366" />
</svg>
